<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-2 | TechWave</title>
    <script src="https://cdn.tailwindcss.com"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">
    
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex-shrink-0 cursor-pointer">
                    <span class="text-2xl font-bold text-white">Tech</span><span class="text-2xl font-bold bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">Wave</span>
                </div>

                <div class="hidden md:flex space-x-8">
                    <a href="#" class="text-gray-300 hover:text-white transition">About</a>
                    <a href="#" class="text-gray-300 hover:text-white transition">Episodes</a>
                    <a href="#" class="text-gray-300 hover:text-white transition">Host</a>
                </div>
                
                <div>
                    <button type="button" class="px-6 py-2 bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] text-white font-semibold rounded-xl hover:opacity-90 transition shadow-lg">
                        Subscribe
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <section class="relative w-full min-h-[600px] flex items-center justify-center bg-[url('assets/hero-bg.png')] bg-cover bg-center py-20 px-4">
        
        <div class="absolute inset-0 bg-gray-900/60 z-0"></div>

        <div class="relative z-10 flex flex-col items-center text-center max-w-3xl mx-auto">
            
            <div class="relative w-32 h-32 mb-6">
                <img src="assets/hero-circle.png" alt="" class="absolute inset-0 w-full h-full object-contain animate-pulse"> 
                <img src="assets/microphone.png" alt="Microphone" class="absolute inset-0 w-full h-full object-contain">
            </div>
               
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6 tracking-tight">
                Techwave
            </h1>
            <p class="text-lg md:text-xl text-gray-300 mb-10 max-w-2xl">
                Your daily dose of tech insights, productivity hacks, and personal growth.
            </p>

            <div class="flex flex-col sm:flex-row gap-5 items-center justify-center w-full">
                
                <button type="button" class="flex items-center justify-center gap-2 px-8 py-3.5 text-white font-semibold bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] rounded-full hover:opacity-90 transition shadow-lg w-full sm:w-auto">
                    <i class="fa-brands fa-spotify text-xl" aria-hidden="true"></i> Listen on Spotify
                </button> 
                
                <a href="#" class="flex items-center justify-center gap-3 rounded-full px-8 py-3.5 text-sm font-semibold text-emerald-300 bg-black/40 ring-1 ring-emerald-300/80 shadow-[0_0_0_1px_rgba(110,231,183,0.25),0_12px_30px_rgba(16,185,129,0.12)] backdrop-blur-md transition hover:bg-black/60 hover:ring-emerald-200 active:scale-[0.98] w-full sm:w-auto">
                    <span class="text-lg">✉️</span>
                    <span>Subscribe to Newsletter</span>
                </a>

            </div>     
        </div>
    </section>

    <footer class="bg-gray-950 bg-[url('assets/footer-bg.png')] bg-cover bg-center py-20 border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
            <!-- bg-cover: bg image full footer area cover korbe 
             bg-center: bg image center theke align hbe footer er 
             py-20: top bottom 20*4=80px jaiga rakhbe vitore
             -->
            
            <div class="text-center mb-10">
                <span class="text-4xl md:text-5xl font-bold text-white">Tech</span><span class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">Wave</span>
            </div>

            <div class="flex flex-wrap justify-center gap-8 md:gap-12">
                <a href="#" class="flex items-center gap-3 group hover:-translate-y-1 transition-transform">
                    <img src="assets/spotify.png" alt="Spotify" class="w-6 h-6 object-contain">
                    <span class="text-gray-400 group-hover:text-white font-medium">Spotify</span>
                </a>
                <a href="#" class="flex items-center gap-3 group hover:-translate-y-1 transition-transform">
                    <img src="assets/apple-podcast.png" alt="Apple Podcasts" class="w-6 h-6 object-contain">
                    <span class="text-gray-400 group-hover:text-white font-medium">Apple Podcasts</span>
                </a>
                <a href="#" class="flex items-center gap-3 group hover:-translate-y-1 transition-transform">
                    <img src="assets/youtube.png" alt="YouTube" class="w-6 h-6 object-contain">
                    <span class="text-gray-400 group-hover:text-white font-medium">YouTube</span>
                </a>
                <a href="#" class="flex items-center gap-3 group hover:-translate-y-1 transition-transform">
                    <img src="assets/twitter.png" alt="Twitter" class="w-6 h-6 object-contain">
                    <span class="text-gray-400 group-hover:text-white font-medium">Twitter</span>
                </a>
            </div>

        </div>
    </footer>

</body>
</html>
