<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment-2</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-[#0b0b14]">

  <!-- NAV -->
  <nav class="w-full bg-gray-800 text-white">
    <div class="mx-auto flex max-w-[1600px] items-center justify-between px-6 py-6">
      <!-- Logo -->
      <div class="text-2xl">
        <span>Tech</span>
        <span class="font-bold bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">
          Wave
        </span>
      </div>

      <!-- Menu -->
      <ul class="hidden gap-8 md:flex">
        <li class="cursor-pointer hover:text-gray-200">About</li>
        <li class="cursor-pointer hover:text-gray-200">Episodes</li>
        <li class="cursor-pointer hover:text-gray-200">Host</li>
      </ul>

      <!-- Button -->
      <button
        type="button"
        class="h-[44px] w-[132px] rounded-xl bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8]
               font-semibold text-white transition hover:brightness-110 active:scale-[0.98]"
      >
        Subscribe
      </button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="mx-auto max-w-[1600px] px-6 py-10">
    <div
      class="relative h-[760px] w-full overflow-hidden rounded-3xl
             bg-[url('assets/hero-bg.png')] bg-cover bg-center"
    >
      <!-- optional overlay for contrast -->
      <div class="absolute inset-0 bg-black/35"></div>

      <!-- Decorative images -->
      <img src="assets/hero-circle.png" alt="" class="absolute right-24 top-20 w-[320px] opacity-90" />
      <img src="assets/microphone.png" alt="" class="absolute right-52 top-52 w-[220px]" />

      <!-- Text -->
      <div class="relative z-10 flex h-full flex-col items-center justify-center text-center">
        <h1 class="text-white text-[56px] font-extrabold leading-[1] sm:text-[72px]">
          Techwave
        </h1>
        <p class="mt-4 max-w-[720px] text-white/90">
          Your daily dose of tech insights, productivity hacks, and personal growth
        </p>

        <!-- Buttons -->
        <div class="mt-8 flex flex-wrap items-center justify-center gap-4">
          <!-- Spotify -->
          <a
            href="#"
            class="inline-flex items-center gap-3 rounded-full px-6 py-3 text-sm font-semibold text-white
                   bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8]
                   shadow-lg shadow-fuchsia-500/20
                   transition hover:brightness-110 active:scale-[0.98]"
          >
            <i class="fa-brands fa-spotify text-lg"></i>
            <span>Listen On Spotify</span>
          </a>

          <!-- Subscribe -->
          <a
            href="#"
            class="inline-flex items-center gap-3 rounded-full px-7 py-3 text-sm font-semibold
                   text-emerald-300 bg-black/30 ring-1 ring-emerald-300/80
                   shadow-[0_0_0_1px_rgba(110,231,183,0.25),0_12px_30px_rgba(16,185,129,0.12)]
                   backdrop-blur-md transition hover:bg-black/40 hover:ring-emerald-200
                   active:scale-[0.98]"
          >
            <span class="text-lg">✉️</span>
            <span>Subscribe</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="w-full">
    <div class="mx-auto max-w-[1600px] px-6 pb-10">
      <div class="h-[412px] w-full rounded-3xl bg-[url('assets/footer-bg.png')] bg-cover bg-center overflow-hidden">
        <div class="flex h-full flex-col items-center justify-center gap-10 px-6 text-center">
          <div class="text-5xl font-bold">
            <span class="text-white">Tech</span>
            <span class="bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">
              Wave
            </span>
          </div>

          <div class="flex flex-wrap items-center justify-center gap-10">
            <a class="flex items-center gap-3 text-white/90 hover:text-white" href="#">
              <img src="assets/spotify.png" alt="Spotify" class="h-6 w-6" />
              <span>Spotify</span>
            </a>

            <a class="flex items-center gap-3 text-white/90 hover:text-white" href="#">
              <img src="assets/apple-podcast.png" alt="Apple Podcasts" class="h-6 w-6" />
              <span>Apple Podcasts</span>
            </a>

            <a class="flex items-center gap-3 text-white/90 hover:text-white" href="#">
              <img src="assets/youtube.png" alt="YouTube" class="h-6 w-6" />
              <span>YouTube</span>
            </a>

            <a class="flex items-center gap-3 text-white/90 hover:text-white" href="#">
              <img src="assets/twitter.png" alt="Twitter" class="h-6 w-6" />
              <span>Twitter</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
